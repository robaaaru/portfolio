<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Portfolio</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // --------------------------------------------------------------
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g., http://www.foo.tld/portfolio/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/portfolio/?/one/two&a=b~and~c=d#qwe
      // Note: this 404.html file must be at least 512 bytes for it to work
      // with Internet Explorer (it is currently > 512 bytes)
      // --------------------------------------------------------------
      var l = window.location;
      var segmentCount = 1; // for /portfolio/ (adjust if base path changes)
      var pathArray = l.pathname.split('/');
      var redirect = l.protocol + '//' + l.host + '/portfolio/';
      if (pathArray.length > segmentCount + 1) {
        redirect += '?/' + pathArray.slice(segmentCount + 1).join('/') + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
      }
      window.location.href = redirect;
    </script>
    <!-- Padding to ensure file is > 512 bytes -->
    <!-- This comment makes the file big enough for Internet Explorer -->
